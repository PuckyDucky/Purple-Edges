<!--

UTF-8 character set:

    Exclamation mark: &#33;
    Quotation mark (double): &quot; or &#34;
    Number sign: &#35;
    Ampersand: &amp; or &#38;
    Quotation mark (single) or apostrophe: &apos; or &#39;
    Left parenthesis: &#40;
    Right parenthesis: &#41;
    Asterisk: &#42;
    Plus sign: &#43;
    Comma: &#44;
    Hyphen-minus: &#45;
    Full stop: &#46;
    Solidus: &#47;
    Colon: &#58;
    Semicolon: &#59;
    Less than: &lt; or &#60;
    Equals sign: &#61;
    Greater than: &gt; or &#62;
    Question mark: &#63;
    Commercial at: &#64;
    Left square bracket: &#91;
    Reverse solidus: &#92;
    Right square bracket: &#93;
    Vertical line: &#124;
    Copyright sign: &copy; or &#169;
    Latin capital letter U with diaeresis: &#220;
    Small letter Iota with dialytika and tonos: &#912;
    Capital letter Iota with dialytika: &#938;
    Small letter Upsilon with dialytika and tonos: &#944;
    
-->

<!DOCTYPE html>
<html lang="el">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title class="greek" id="titleAbout"></title>
        <link rel="icon" sizes="128x128" href="./Assets/Icon (Purple Edges).svg">

        <!-- Stylesheets -->
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="./css/style.css">

        <!-- Dark mode feature for Tailwind -->
        <script>
            tailwind.config = {
                darkMode: 'class', // Dark mode activation for CDN
                theme: {
                    extend: {
                        // Custom colors or fonts
                        colors: {
                            'brand-purple': '#81699A',
                        },
                    }
                }
            }

            if (localStorage.theme === 'dark' || (!('theme' in localStorage))) {
                // If the user has explicitly chosen dark mode, or if no preference is set, enable dark mode
                if (localStorage.theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }
        </script>
    </head>

    <body class="bg-white text-black dark:bg-black dark:text-white transition-colors duration-300">
        <a href="#main-content" class="absolute left-[-9999px] focus:left-0 top-0 bg-white text-black p-3 z-[999]">
            Πήδηση στο Κύριο Περιεχόμενο
        </a>


        <!-- Burger menu (closed) -->
        <header class="fixed top-0 left-0 w-full z-50 p-6 md:p-8">
            <div class="flex justify-between items-center">
                <a href="./index.html" class="w-32 md:w-40 z-30 block">
                    <img src="./Assets/Navbar logo (Purple Edges).svg" alt="Logo with text" class="w-full h-auto">
                </a>

                <button id="menu-toggle" class="relative w-8 h-8 flex flex-col justify-around items-center z-30 focus:outline-none"
                aria-label="Toggle burger menu">
                    <span class="block w-full h-0.5 bg-black dark:bg-white transition-all duration-300 ease-in-out transform origin-center"
                        id="line-top"></span>

                    <span class="block w-full h-0.5 bg-black dark:bg-white transition-all duration-300 ease-in-out transform origin-center"
                        id="line-middle"></span>

                    <span class="block w-full h-0.5 bg-black dark:bg-white transition-all duration-300 ease-in-out transform origin-center"
                        id="line-bottom"></span>
                </button>
            </div>
        </header>

        <!-- Burger menu (open) -->
        <nav id="full-menu" class="fixed top-0 left-0 w-full h-full bg-white dark:bg-black bg-opacity-95 transition-colors duration-300
        z-40 flex flex-col justify-center items-center transform -translate-y-full transition-transform duration-500 ease-in-out">
            <ul class="text-4xl md:text-6xl font-light text-center space-y-6">
                <li>
                    <a href="./index.html" class="hover:text-brand-purple dark:hover:text-gray-400 transition duration-300 greek" id="home"></a>
                </li>

                <li>
                    <a href="./projects.html" class="hover:text-brand-purple dark:hover:text-gray-400 transition duration-300">Projects</a>
                </li>

                <li>
                    <a href="./about.html" class="hover:text-brand-purple dark:hover:text-gray-400 transition duration-300 greek" id="info"></a>
                </li>

                <li>
                    <a href="./contact.html" class="hover:text-brand-purple dark:hover:text-gray-400 transition duration-300 greek" id="contact"></a>
                </li>
            </ul>

            <div id="language-switcher" class="flex gap-4 pt-20 text-brand-purple dark:text-white">
                <button onclick="changeLanguage('el')" class="font-bold hover:opacity-100">EL</button>
                
                <button onclick="changeLanguage('en')" class="opacity-50 hover:opacity-100">EN</button>
            </div>

            <div class="mt-12 text-sm text-gray-500">&copy; 2026 Purple Edges&#46;</div>
        </nav>


        <!-- Short profiling of the studio and timeline -->
        <main id="main-content" class="pt-24 md:pt-32 pb-16 px-4 md:px-8 min-h-screen">
            <!-- Profiling -->
            <section class="max-w-4xl mx-auto mb-12 text-lg font-light leading-relaxed">
                <p class="mb-6 greek" id="description"></p>
            </section>

            <!-- Timeline -->
            <section class="max-w-4xl mx-auto">
                <div class="border-l-2 border-brand-purple dark:border-gray-400 ml-3 space-y-12">
                    <!-- First milestone -->
                    <div class="relative pl-8">
                        <div class="absolute -left-[8.75px] top-2 w-4 h-4 bg-black dark:bg-white rounded-full"></div>

                        <h3 class="text-2xl font-semibold text-black dark:text-white mb-1">2023</h3>

                        <p class="text-brand-purple dark:text-gray-400 greek" id="2023"></p>
                    </div>
            
                    <!-- Second milestone -->
                    <div class="relative pl-8">
                        <div class="absolute -left-[8.75px] top-2 w-4 h-4 bg-black dark:bg-white rounded-full"></div>

                        <h3 class="text-2xl font-semibold text-black dark:text-white mb-1">2024</h3>

                        <p class="text-brand-purple dark:text-gray-400 greek" id="2024"></p>
                    </div>
            
                    <!-- Third milestone -->
                    <div class="relative pl-8">
                        <div class="absolute -left-[8.75px] top-2 w-4 h-4 bg-black dark:bg-white rounded-full"></div>

                        <h3 class="text-2xl font-semibold text-black dark:text-white mb-1">2025</h3>

                        <p class="text-brand-purple dark:text-gray-400 greek" id="2025"></p>
                    </div>
            
                    <!-- Fourth milestone -->
                    <div class="relative pl-8">
                        <div class="absolute -left-[8.75px] top-2 w-4 h-4 bg-black dark:bg-white rounded-full"></div>

                        <h3 class="text-2xl font-semibold text-black dark:text-white mb-1">2026-</h3>

                        <p class="text-brand-purple dark:text-gray-400 greek" id="2026"></p>
                    </div>
                </div>
            </section>
        </main>


        <!-- Toggle bar for switching between light and dark mode -->
        <div id="theme-toggle" class="fixed bottom-6 right-6 z-50 cursor-pointer bg-gray-300 dark:bg-gray-700 text-gray-900 dark:text-gray-100
        rounded-full px-4 py-2 flex items-center gap-2 shadow-lg transition-all duration-300" aria-label="Toggle light and dark mode">
            <span id="light-label" class="text-xs font-bold transition-opacity px-1">LIGHT</span>
            <span id="dark-label" class="text-xs font-bold transition-opacity px-1">DARK</span>
        </div>


        <!-- Footer -->
        <footer class="mt-20 py-6 border-t border-gray-400 text-center">
            <a href="./accessibility.html" class="text-xs text-gray-400 hover:text-brand-purple dark:hover:text-gray-300 transition-colors
            duration-300 greek" id="a11y"></a>
        </footer>


        <!-- Custom JavaScript -->
        <script src="./js/script.js"></script>
    </body>

</html>

<!--

UTF-8 character set:

    Exclamation mark: &#33;
    Quotation mark (double): &quot; or &#34;
    Number sign: &#35;
    Ampersand: &amp; or &#38;
    Quotation mark (single) or apostrophe: &apos; or &#39;
    Left parenthesis: &#40;
    Right parenthesis: &#41;
    Asterisk: &#42;
    Plus sign: &#43;
    Comma: &#44;
    Hyphen-minus: &#45;
    Full stop: &#46;
    Solidus: &#47;
    Colon: &#58;
    Semicolon: &#59;
    Less than: &lt; or &#60;
    Equals sign: &#61;
    Greater than: &gt; or &#62;
    Question mark: &#63;
    Commercial at: &#64;
    Left square bracket: &#91;
    Reverse solidus: &#92;
    Right square bracket: &#93;
    Vertical line: &#124;
    Latin capital letter U with diaeresis: &#220;
    Small letter Iota with dialytika and tonos: &#912;
    Capital letter Iota with dialytika: &#938;
    Small letter Upsilon with dialytika and tonos: &#944;
    
-->

<!DOCTYPE html>
<html lang="el">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title class="greek" id="titleHome"></title>
        <link rel="icon" sizes="128x128" href="./Assets/Icon (Purple Edges).svg">

        <!-- Stylesheets -->
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="./css/style.css">
    </head>

    <body class="bg-black text-white">
        <a href="#main-content" class="absolute left-[-9999px] focus:left-0 top-0 bg-white text-black p-3 z-[999]">
            Πήδηση στο Κύριο Περιεχόμενο
        </a>


        <!-- Burger menu (closed) -->
        <header class="fixed top-0 left-0 w-full z-50 p-6 md:p-8">
            <div class="flex justify-between items-center">
                <a href="./index.html" id="logo" class="text-xl font-light tracking-widest uppercase z-30"></a>

                <button id="menu-toggle" class="relative w-8 h-8 flex flex-col justify-around items-center z-30 focus:outline-none">
                    <span class="block w-full h-0.5 bg-white transition-all duration-300 ease-in-out transform origin-center"
                        id="line-top"></span>

                    <span class="block w-full h-0.5 bg-white transition-all duration-300 ease-in-out transform origin-center"
                        id="line-middle"></span>

                    <span class="block w-full h-0.5 bg-white transition-all duration-300 ease-in-out transform origin-center"
                        id="line-bottom"></span>
                </button>
            </div>
        </header>

        <!-- Burger menu (open) -->
        <nav id="full-menu" class="fixed top-0 left-0 w-full h-full bg-black bg-opacity-95 z-40 flex flex-col justify-center
        items-center transform -translate-y-full transition-transform duration-500 ease-in-out">
            <ul class="text-4xl md:text-6xl font-light text-center space-y-6">
                <li><a href="./index.html" class="hover:text-gray-400 transition duration-300 greek" id="home"></a></li>

                <li><a href="./projects.html" class="hover:text-gray-400 transition duration-300">Projects</a></li>

                <li><a href="./about.html" class="hover:text-gray-400 transition duration-300 greek" id="info"></a></li>

                <li><a href="./contact.html" class="hover:text-gray-400 transition duration-300 greek" id="contact"></a></li>
            </ul>

            <div id="language-switcher" class="flex gap-4 pt-20 text-white">
                <button onclick="changeLanguage('el')" class="font-bold border-b-2 border-white">EL</button>
                
                <button onclick="changeLanguage('en')" class="opacity-50 hover:opacity-100">EN</button>
            </div>

            <div class="mt-12 text-sm text-gray-500">&copy; 2026 Purple Edges&#46</div>
        </nav>


        <!-- Hero image -->
        <main id="main-content" class="relative h-screen overflow-hidden">
            <div class="absolute inset-0 flex flex-col justify-center items-center z-0">
                <img src="./Assets/Logo.png" alt="Purple Edges Logo" class="w-96 animate-entrance">
            </div>
        </main>


        <!-- Custom JavaScript -->
        <script src="./js/script.js"></script>
    </body>

</html>

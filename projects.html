<!--

UTF-8 character set:

    Exclamation mark: &#33;
    Quotation mark (double): &quot; or &#34;
    Number sign: &#35;
    Ampersand: &amp; or &#38;
    Quotation mark (single) or apostrophe: &apos; or &#39;
    Left parenthesis: &#40;
    Right parenthesis: &#41;
    Asterisk: &#42;
    Plus sign: &#43;
    Comma: &#44;
    Hyphen-minus: &#45;
    Full stop: &#46;
    Solidus: &#47;
    Colon: &#58;
    Semicolon: &#59;
    Less than: &lt; or &#60;
    Equals sign: &#61;
    Greater than: &gt; or &#62;
    Question mark: &#63;
    Commercial at: &#64;
    Left square bracket: &#91;
    Reverse solidus: &#92;
    Right square bracket: &#93;
    Vertical line: &#124;
    Latin capital letter U with diaeresis: &#220;
    Small letter Iota with dialytika and tonos: &#912;
    Capital letter Iota with dialytika: &#938;
    Small letter Upsilon with dialytika and tonos: &#944;
    
-->

<!DOCTYPE html>
<html lang="el">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Purple Edges &#45 Projects</title>
        <link rel="icon" sizes="128x128" href="./Assets/Icon (Purple Edges).svg">

        <!-- Stylesheets -->
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="./css/style.css">
    </head>

    <body class="bg-black text-white">
        <a href="#main-content" class="absolute left-[-9999px] focus:left-0 top-0 bg-white text-black p-3 z-[999]">
            Πήδηση στο Κύριο Περιεχόμενο
        </a>


        <!-- Burger menu (closed) -->
        <header class="fixed top-0 left-0 w-full z-50 p-6 md:p-8">
            <div class="flex justify-between items-center">
                <a href="./index.html" class="w-32 md:w-40 z-30 block">
                    <img src="./Assets/Navbar logo (Purple Edges).svg" alt="Logo with text" class="w-full h-auto">
                </a>

                <button id="menu-toggle" class="relative w-8 h-8 flex flex-col justify-around items-center z-30 focus:outline-none">
                    <span class="block w-full h-0.5 bg-white transition-all duration-300 ease-in-out transform origin-center"
                        id="line-top"></span>

                    <span class="block w-full h-0.5 bg-white transition-all duration-300 ease-in-out transform origin-center"
                        id="line-middle"></span>

                    <span class="block w-full h-0.5 bg-white transition-all duration-300 ease-in-out transform origin-center"
                        id="line-bottom"></span>
                </button>
            </div>
        </header>

        <!-- Burger menu (open) -->
        <nav id="full-menu" class="fixed top-0 left-0 w-full h-full bg-black bg-opacity-95 z-40 flex flex-col justify-center
        items-center transform -translate-y-full transition-transform duration-500 ease-in-out">
            <ul class="text-4xl md:text-6xl font-light text-center space-y-6">
                <li><a href="./index.html" class="hover:text-gray-400 transition duration-300 greek" id="home"></a></li>

                <li><a href="./projects.html" class="hover:text-gray-400 transition duration-300">Projects</a></li>

                <li><a href="./about.html" class="hover:text-gray-400 transition duration-300 greek" id="info"></a></li>

                <li><a href="./contact.html" class="hover:text-gray-400 transition duration-300 greek" id="contact"></a></li>
            </ul>

            <div id="language-switcher" class="flex gap-4 pt-20 text-white">
                <button onclick="changeLanguage('el')" class="font-bold border-b-2 border-white">EL</button>

                <button onclick="changeLanguage('en')" class="opacity-50 hover:opacity-100">EN</button>
            </div>

            <div class="mt-12 text-sm text-gray-500">&copy; 2026 Purple Edges&#46</div>
        </nav>


        <!-- Mansory grid for showcasing the projects -->
        <main id="main-content" class="pt-24 md:pt-32 pb-16 px-4 md:px-8 min-h-screen">
           <!-- Grid -->
            <div id="masonry-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto pt-20">
                <!-- First project -->
                <a href="#" class="project-item group block p-4 bg-gray-800 hover:bg-gray-700 transition duration-300 h-96 flex
                flex-col items-center group" aria-labelledby="project-title-1">
                    <div onclick="openLightbox('bedroom', './Images/Bedroom/darkBedroom.jpg')" class="cursor-pointer flex-grow flex-col
                    justify-center items-center group text-3xl font-thin text-gray-500">
                        <img src="./Images/Bedroom/darkBedroom.jpg" class="h-64 object-fill overflow-hidden border border-white"
                        alt="Thumbnail of a bedroom project (bedroom with gray sheets)">
                    </div>

                    <h2 class="text-lg mt-4 text-white py-5 greek" id="bedroomText"></h2>
                </a>

                <!-- Second project -->
                <a href="#" class="project-item group block p-4 bg-gray-800 hover:bg-gray-700 transition duration-300 h-96 flex
                flex-col items-center group" aria-labelledby="project-title-2">
                    <div onclick="openLightbox('kitchen', './Images/Kitchen/greenKitchen1.jpg')" class="cursor-pointer flex-grow flex-col
                    justify-center items-center text-3xl font-thin text-gray-500">
                        <img src="./Images/Kitchen/greenKitchen1.jpg" class="h-64 object-fill overflow-hidden border border-white"
                        alt="Thumbnail of a kitchen project (kitchen with green details)">
                    </div>

                    <h2 class="text-lg mt-4 text-white py-5 greek" id="kitchenText"></h2>
                </a>

                <!-- Third project -->
                <a href="#" class="project-item group block p-4 bg-gray-800 hover:bg-gray-700 transition duration-300 h-96 flex
                flex-col items-center group" aria-labelledby="project-title-3">
                    <div onclick="openLightbox('livingRoom', './Images/Living room/openFloor2.jpg')" class="cursor-pointer flex-grow
                    flex-col justify-center items-center text-3xl font-thin text-gray-500">
                        <img src="./Images/Living room/openFloor2.jpg" class="h-64 object-fill overflow-hidden border border-white"
                        alt="Thumbnail of a living room project (dark living room with orange sofa)">
                    </div>

                    <h2 class="text-lg mt-4 text-white py-5 greek" id="livingRoomText"></h2>
                </a>
            </div>
        </main>


        <!-- Lightbox gallery for the projects about bedrooms -->
        <div id="bedroom" class="lightbox fixed inset-0 bg-black bg-opacity-90 hidden z-50 flex-col items-center justify-center p-4">
            <button onclick="closeLightbox()" class="absolute top-5 right-5 text-white text-3xl">&times;</button>
        
            <!-- Main image -->
            <img src="./Images/Bedroom/darkBedroom.jpg" class="main-image max-w-full max-h-[70vh] object-contain mb-6"
            alt="Main image for bedroom project (bedroom with gray sheets)">
        
            <!-- Thmubnails -->
            <div class="flex gap-2 overflow-x-auto w-full max-w-lg pb-2">
                <img src="./Images/Bedroom/darkBedroom.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Bedroom with gray sheets" onclick="changeImage(this)">

                <img src="./Images/Bedroom/darkWardrobe.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Wardrobe with gray floor" onclick="changeImage(this)">

                <img src="./Images/Bedroom/darkBathroom.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Bathroom with two mirrors" onclick="changeImage(this)">

                <img src="./Images/Bedroom/blueBedroom.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Bedroom with blue details" onclick="changeImage(this)">

                <img src="./Images/Bedroom/blueChildBedroom.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Children's bedroom with blue details" onclick="changeImage(this)">

                <img src="./Images/Bedroom/blueCorridor.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Corridor with blue paneling" onclick="changeImage(this)">

                <img src="./Images/Bedroom/blueBathroom.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Bathroom with one mirror" onclick="changeImage(this)">
            </div>
        </div>

        <!-- Lightbox gallery for the projects about kitchens -->
        <div id="kitchen" class="lightbox fixed inset-0 bg-black bg-opacity-90 hidden z-50 flex-col items-center justify-center p-4">
            <button onclick="closeLightbox()" class="absolute top-5 right-5 text-white text-3xl">&times;</button>
        
            <!-- Main image -->
            <img src="./Images/Kitchen/greenKitchen1.jpg" class="main-image max-w-full max-h-[70vh] object-contain mb-6"
            alt="Main image for kitchen project (kitchen with green details)">
        
            <!-- Thumbnails -->
            <div class="flex gap-2 overflow-x-auto w-full max-w-lg pb-2">
                <img src="./Images/Kitchen/greenKitchen1.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Kitchen with green details (aspect no.1)" onclick="changeImage(this)">

                <img src="./Images/Kitchen/greenKitchen3.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Kitchen with green details (aspect no.2)" onclick="changeImage(this)">

                <img src="./Images/Kitchen/greenKitchen2.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Kitchen with green details (aspect no.3)" onclick="changeImage(this)">

                <img src="./Images/Kitchen/darkKitchen.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Kitchen with dark details" onclick="changeImage(this)">

                <img src="./Images/Kitchen/blueKitchen.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Kitchen with blue details" onclick="changeImage(this)">

                <img src="./Images/Kitchen/bar.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Bar with green details" onclick="changeImage(this)">
            </div>
        </div>

        <!-- Lightbox gallery for the projects about bedrooms -->
        <div id="livingRoom" class="lightbox fixed inset-0 bg-black bg-opacity-90 hidden z-50 flex-col items-center justify-center p-4">
            <button onclick="closeLightbox()" class="absolute top-5 right-5 text-white text-3xl">&times;</button>
        
            <!-- Main image -->
            <img src="./Images/Living room/openFloor2.jpg" class="main-image max-w-full max-h-[70vh] object-contain mb-6"
            alt="Main image for living room project (dark living room with orange sofa)">
        
            <!-- Thumbnails -->
            <div class="flex gap-2 overflow-x-auto w-full max-w-lg pb-2">
                <img src="./Images/Living room/openFloor2.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Dark living room with orange sofa" onclick="changeImage(this)">

                <img src="./Images/Living room/blueLivingRoom.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2
                border-transparent shrink-0" alt="Blue-gray living room with TV" onclick="changeImage(this)">

                <img src="./Images/Living room/openFloor1.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2
                border-transparent shrink-0" alt="Open-floor living room with wooden kitchen" onclick="changeImage(this)">

                <img src="./Images/Living room/darkOpenFloor.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2
                border-transparent shrink-0" alt="Open-floor living room with fireplace" onclick="changeImage(this)">

                <img src="./Images/Living room/blueOpenFloor.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2
                border-transparent shrink-0" alt="Open-floor living room with blue dining chairs" onclick="changeImage(this)">

                <img src="./Images/Living room/brownLivingRoom.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2
                border-transparent shrink-0" alt="Living room with a glass door facing the garden" onclick="changeImage(this)">

                <img src="./Images/Living room/livingRoom.jpg" class="thumb w-16 h-16 object-cover cursor-pointer border-2 border-transparent
                shrink-0" alt="Living room with wooden rods on the ceiling" onclick="changeImage(this)">
            </div>
        </div>


        <!-- Custom JavaScript -->
        <script src="./js/script.js"></script>
    </body>

</html>
